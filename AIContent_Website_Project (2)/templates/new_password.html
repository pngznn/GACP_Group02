<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='reset.css') }}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <h2>Reset your Password!</h2>
        <p>Please enter and confirm your new password!</p>

        <form method="POST" novalidate>

            <div class="input-group">
                <!-- Lock Icon -->
                <svg class="icon-left" viewBox="0 0 24 24">
                    <path d="M17 8V6a5 5 0 00-10 0v2H5v14h14V8h-2zm-8 
                    0V6a3 3 0 016 0v2H9z"/>
                </svg>

                <input type="password" name="password" placeholder="New password">

                <svg class="icon-right eye-open"
                    onclick="togglePassword(this, 'password')"
                    viewBox="0 0 24 24">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>

                <svg class="icon-right eye-closed"
                    onclick="togglePassword(this, 'password')"
                    viewBox="0 0 24 24"
                    style="display:none;">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                    <line x1="4" y1="4" x2="20" y2="20"/>
                </svg>

            </div>

            <div class="input-group">
                <!-- Lock Icon -->
                <svg class="icon-left" viewBox="0 0 24 24">
                    <path d="M17 8V6a5 5 0 00-10 0v2H5v14h14V8h-2zm-8 
                    0V6a3 3 0 016 0v2H9z"/>
                </svg>

                <input type="password" name="confirm_password" placeholder="Confirm new password">

                <svg class="icon-right eye-open"
                    onclick="togglePassword(this, 'confirm_password')"
                    viewBox="0 0 24 24">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>

                <svg class="icon-right eye-closed"
                    onclick="togglePassword(this, 'confirm_password')"
                    viewBox="0 0 24 24"
                    style="display:none;">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                    <line x1="4" y1="4" x2="20" y2="20"/>
                </svg>

            </div>
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <div class="btn-group">
                <a href="{{ url_for('login') }}" class="back-btn">Back to Login</a>
                <button type="submit" class="ok-btn">Reset</button>
            </div>

        </form>
    </div>
</div>

<script>
function togglePassword(icon, inputName) {
    const input = document.querySelector(`input[name="${inputName}"]`);
    const eyeOpen = icon.parentElement.querySelector(".eye-open");
    const eyeClosed = icon.parentElement.querySelector(".eye-closed");

    if (input.type === "password") {
        input.type = "text";
        eyeOpen.style.display = "none";
        eyeClosed.style.display = "block";
    } else {
        input.type = "password";
        eyeOpen.style.display = "block";
        eyeClosed.style.display = "none";
    }
}
</script>

</body>
{% if success %}
<div id="overlay"></div>

<div id="toast">
    ✓ Reset password successfully!
</div>

<script>
setTimeout(() => {
    window.location.href = "{{ url_for('login') }}";
}, 1500);
</script>
{% endif %}
</html>
