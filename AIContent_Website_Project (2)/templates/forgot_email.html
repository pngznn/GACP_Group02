<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='forgot.css') }}?v=1">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <h2>Reset your Password!</h2>
        <p>Please enter your email address to recover your password!</p>

        <form method="POST" novalidate>

            <div class="input-group">
                <svg class="icon-left" viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 
                    2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 
                    4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
                <input type="email" name="email" placeholder="Email">
            </div>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <div class="btn-group">
                <a href="{{ url_for('login') }}" class="back-btn">Back</a>
                <button type="submit" class="ok-btn">OK</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
