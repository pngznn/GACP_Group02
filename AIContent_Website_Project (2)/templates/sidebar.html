<!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="{{ url_for('home') }}" class="brand">
            <img src="{{ url_for('static', filename='logo.png') }}" class="brand-logo">
            <div>
                <h2>KoVa</h2>
                <p>Content Studio</p>
            </div>
        </a>

        <!-- Gạch 1 -->
        <hr class="divider top-divider">

        <nav class="menu">
            <a href="{{ url_for('home') }}"
                class="{% if request.endpoint == 'home' %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M3 10.5L12 3l9 7.5"/>
                    <path d="M5 9.5V21h14V9.5"/>
                </svg>
                Home
            </a>

            <a href="{{ url_for('ai_library') }}"
                class="{% if request.endpoint in ['ai_library','create_ai','content_detail'] %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 3v4"/>
                    <path d="M12 17v4"/>
                    <path d="M4.9 4.9l2.8 2.8"/>
                    <path d="M16.3 16.3l2.8 2.8"/>
                    <path d="M3 12h4"/>
                    <path d="M17 12h4"/>
                </svg>
                AI Generator
            </a>

            <a href="{{ url_for('template_brand') }}"
                class="{% if request.endpoint == 'template_brand' %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                Template & Brand
            </a>

            <a href="{{ url_for('seo_optimizer') }}"
                        class="{% if request.endpoint == 'seo_optimizer' %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="11" cy="11" r="7"/>
                    <path d="M21 21l-4.3-4.3"/>
                </svg>
                SEO Optimizer
            </a>

            <a href="{{ url_for('collaboration') }}"
            class="{% if request.endpoint == 'collaboration' %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="8" cy="8" r="3"/>
                    <circle cx="16" cy="16" r="3"/>
                    <path d="M11 11l2 2"/>
                </svg>
                Collaboration
            </a>

            <a href="{{ url_for('approval') }}"
                class="{% if request.endpoint == 'approval' %}active{% endif %}">
                <svg viewBox="0 0 24 24" class="menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M9 12l2 2 4-4"/>
                    <rect x="3" y="3" width="18" height="18" rx="4"/>
                </svg>
                Approval
            </a>

        </nav>

        <!-- Gạch 2 -->
        <div class="bottom-section">
            <hr class="divider bottom-divider">

            <div class="user" id="profileBtn">
                <div class="avatar">
                    {{ name[0]|upper }}
                </div>
                <div>
                    <p class="username">{{ name }}</p>
                    <span class="small-text">Profile</span>
                </div>
            </div>

            <!-- POPUP -->
            <div class="profile-popup" id="profilePopup">
                <div class="popup-header" id="openProfileModal">
                    <div class="avatar large">
                        {{ name[0]|upper }}
                    </div>
                    <div>
                        <p class="username">{{ name }}</p>
                        <p class="email">{{ session["user"]["email"] }}</p>
                    </div>
                </div>

                <hr>

                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logout-icon">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Log out
                </a>
            </div>
        </div>
    </aside>
